<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAPPS - Clinical Manager Pro v5.6</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; 
            --success: #10b981; --border: #334155; --danger: #ef4444; --warning: #f59e0b;
        }
        
        html, body { 
            height: 100vh; margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease; text-align: center;
        }

        .container { width: 98%; max-width: 1100px; display: none; padding: 10px; box-sizing: border-box; }

        .card { 
            background: var(--card); padding: 30px 50px; border-radius: 28px; border: 1px solid var(--border); 
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); animation: slideUp 0.5s ease;
            max-height: 98vh; display: flex; flex-direction: column; overflow-y: auto;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { color: var(--accent); text-align: center; margin: 15px 0; font-size: 1.8rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        label { font-size: 0.9rem; color: var(--accent); font-weight: 600; margin-left: 5px; text-transform: uppercase; }

        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box; font-size: 1.1rem; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        .section-header { text-align: center; color: var(--accent); font-weight: 800; text-transform: uppercase; font-size: 1rem; letter-spacing: 2px; }
        
        .section-desc {
            background: rgba(56, 189, 248, 0.08); border-left: 5px solid var(--accent);
            padding: 15px 20px; border-radius: 12px; margin: 15px 0; font-size: 1.1rem; color: #cbd5e1; line-height: 1.5;
        }

        .progress-bar { width: 100%; height: 10px; background: var(--border); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress { height: 100%; background: linear-gradient(90deg, #0ea5e9, #38bdf8); width: 0%; transition: width 0.3s ease; }
        
        .question-text { font-size: 1.4rem; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; margin: 20px 0; font-weight: 600; line-height: 1.4; color: #fff; }
        
        .options { display: flex; flex-direction: column; gap: 8px; }
        .opt-btn { 
            background: #243147; padding: 10px 15px; border-radius: 14px; color: white; 
            border: 2px solid var(--warning); 
            cursor: pointer; text-align: left; font-size: 1.5rem; display: flex; align-items: center; gap: 15px; transition: 0.1s;
        }
        .opt-btn.selected { border-color: var(--success); background: rgba(16, 185, 129, 0.2); }
        .opt-value { font-size: 1.6rem; font-weight: 900; min-width: 65px; text-align: center; color: var(--accent); background: rgba(0,0,0,0.3); border-radius: 8px; padding: 6px 0; }
        .opt-text { font-size: 1.1rem; }
        
        .btn-action { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--accent); color: var(--bg); font-weight: 800; cursor: pointer; margin-top: 15px; font-size: 1.1rem; text-transform: uppercase; transition: transform 0.1s; }
        .history-item { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 1rem; border-left: 5px solid var(--accent); transition: 0.2s; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 1.1rem; }
        .category-score { background: var(--accent); color: var(--bg); padding: 5px 12px; border-radius: 8px; font-weight: 800; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash-screen">
    <h1 style="color:var(--accent); font-size: 4.5rem; margin:0;">CHAPPS</h1>
    <p style="color:#94a3b8; font-size: 1.4rem;">Children's Auditory Performance Scale</p>
</div>

<div class="container" id="app-container">
    <div id="screen-start" class="card">
        <h2>Στοιχεία Εξεταζόμενου</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="input-group">
                <label>Ονοματεπώνυμο</label>
                <input type="text" id="pName" placeholder="π.χ. Ιωάννης Παπαδόπουλος">
            </div>
            <div class="input-group">
                <label>Ημερομηνία Γέννησης</label>
                <input type="text" id="pDOB" placeholder="ΗΗ/ΜΜ/ΕΕΕΕ" maxlength="10" oninput="formatDate(this)">
            </div>
            <div class="input-group">
                <label>Email Επικοινωνίας</label>
                <input type="email" id="pEmail" placeholder="π.χ. info@clinic.gr">
            </div>
            <div class="input-group">
                <label>Συμπληρώνεται από</label>
                <input type="text" id="pResponder" placeholder="π.χ. Μητέρα / Δάσκαλος">
            </div>
        </div>

        <button class="btn-action" onclick="startTest()">ΕΝΑΡΞΗ ΑΞΙΟΛΟΓΗΣΗΣ</button>
        <div style="text-align: center; margin-top: 25px; cursor: pointer; color: #475569; font-size: 0.95rem;" onclick="unlockAdmin()">🔒 Διαχείριση Ιστορικού</div>
        
        <div id="admin-panel" class="hidden" style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
            <input type="text" id="searchBar" placeholder="🔍 Αναζήτηση με όνομα..." oninput="renderHistory()">
            <div id="history-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="btn-action" style="background: var(--warning); font-size:0.9rem;" onclick="exportMasterCSV()">MASTER EXCEL (CSV)</button>
        </div>
    </div>

    <div id="screen-test" class="card hidden">
        <div id="cat-label" class="section-header"></div>
        <div class="progress-bar"><div id="progress"></div></div>
        <div id="cat-desc" class="section-desc"></div>
        <div id="q-text" class="question-text"></div>
        <div id="options-list" class="options"></div>
        <div style="display:flex; gap:15px; margin-top:20px;">
            <button id="prev-btn" style="flex:1; padding:15px; border-radius:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); cursor:pointer; font-weight:bold;" onclick="goBack()">← ΠΙΣΩ</button>
            <button id="next-btn" class="btn-action" style="flex:2; margin-top:0;" onclick="goNext()">ΕΠΟΜΕΝΟ →</button>
        </div>
    </div>

    <div id="screen-results" class="card hidden">
        <h2 id="res-name-display" style="margin-bottom:0; font-size: 2.2rem;"></h2>
        <p id="res-info-display" style="text-align:center; color:var(--accent); font-size:1.2rem; margin:10px 0;"></p>
        <div id="total-score" style="text-align:center; font-size: 4rem; color: var(--success); font-weight: 900; margin: 10px 0;"></div>
        <div id="breakdown-list" style="margin-bottom: 20px;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-action" style="background: var(--success); color:white;" onclick="sendToDoctor()">📧 EMAIL ΣΤΟΝ ΙΑΤΡΟ</button>
            <button class="btn-action" style="background: var(--warning); color:white;" onclick="exportCSV()">📊 ΕΞΑΓΩΓΗ CSV</button>
        </div>
        <button class="btn-action" onclick="location.reload()" style="background: transparent; color: #94a3b8; border: 1px solid var(--border);">ΝΕΑ ΑΞΙΟΛΟΓΗΣΗ</button>
    </div>
</div>

<script>
    const sections = [
        { name: "ΘΟΡΥΒΟΣ", desc: "Αν ακούει σε ένα δωμάτιο με θόρυβο από τηλεόραση, μουσική, άλλα άτομα που μιλούν, παιδιά που παίζουν κ.α. αυτό το παιδί έχει δυσκολία στο να ακούσει και να καταλάβει όταν συγκριθεί με άλλα παιδιά της ίδιας ηλικίας.", questions: ["Όταν προσέχει", "Όταν πρέπει να απαντήσει σε μια ερώτηση", "Όταν του δοθούν απλές-σύντομες οδηγίες", "Όταν του δοθούν πολύπλοκες οδηγίες", "Όταν δεν προσέχει", "Όταν πραγματοποιεί και άλλες δραστηριότητες π.χ ζωγραφίζει, διαβάζει", "Όταν βρίσκεται με ομάδα παιδιών"] },
        { name: "ΗΣΥΧΙΑ", desc: "Αν ακούει σε ένα ήσυχο δωμάτιο (όπου μπορεί να υπάρχουν και άλλα άτομα χωρίς όμως να κάνουν φασαρία) αυτό το παιδί έχει δυσκολία στο να ακούσει και να καταλάβει όταν συγκριθεί με άλλα παιδιά της ίδιας ηλικίας.", questions: ["Όταν προσέχει", "Όταν πρέπει να απαντήσει σε μια ερώτηση", "Όταν του δοθούν απλές-σύντομες οδηγίες", "Όταν του δοθούν πολύπλοκες οδηγίες", "Όταν δεν προσέχει", "Όταν πραγματοποιεί και άλλες δραστηριότητες π.χ ζωγραφίζει, διαβάζει", "Όταν βρίσκεται με ομάδα παιδιών"] },
        { name: "ΙΔΑΝΙΚΕΣ ΣΥΝΘΗΚΕΣ", desc: "Αν ακούει σε ένα ήσυχο δωμάτιο, χωρίς άλλα ερεθίσματα, που να του αποσπούν την προσοχή, πρόσωπο με πρόσωπο και βλέποντας τον ομιλητή αυτό το παιδί έχει δυσκολία στο να ακούσει και να καταλάβει όταν συγκριθεί με άλλα παιδιά της ίδιας ηλικίας.", questions: ["Όταν πρέπει να απαντήσει σε μια ερώτηση", "Όταν του δοθούν απλές-σύντομες οδηγίες", "Όταν του δοθούν πολύπλοκες οδηγίες"] },
        { name: "ΠΟΛΛΑΠΛΑ ΕΡΕΘΙΣΜΑΤΑ", desc: "Αν σε συνδυασμό με το ότι ακούει, υπάρχει και κάποιο άλλο ερέθισμα (οπτικό, αφής, κ.α), αυτό το παιδί έχει δυσκολία στο να ακούσει και να καταλάβει όταν συγκριθεί με άλλα παιδιά της ίδιας ηλικίας.", questions: ["Όταν ακούει και βλέπει το πρόσωπο του ομιλητή", "Όταν ακούει και διαβάζει από μέσα του καθώς ένα κείμενο διαβάζεται για όλη την τάξη από την δασκάλα", "Όταν ακούει και παρακολουθεί τον δάσκαλο να ζωγραφίζει κάτι στον πίνακα ή να δείχνει κάτι σε διαφάνειες ή μεγάλες κάρτες"] },
        { name: "ΑΚΟΥΣΤΙΚΗ ΜΝΗΜΗ", desc: "Αν πρέπει να ανακαλέσει πληροφορίες, που του δόθηκαν με προφορικό λόγο, αυτό το παιδί έχει δυσκολία στο να ακούσει και να καταλάβει όταν συγκριθεί με άλλα παιδιά της ίδιας ηλικίας.", questions: ["Να ανακαλέσει αμέσως πληροφορίες, όπως λέξεις, ορθογραφία, αριθμούς", "Να ανακαλέσει αμέσως απλές οδηγίες", "Να ανακαλέσει αμέσως πολύπλοκες οδηγίες", "Όχι μόνο υπάρχει δυσκολία στο να ανακαλέσει πληροφορίες, αλλά έχει δυσκολία και στο να ανακαλέσει την σειρά με την οποία ειπώθηκαν ή πρέπει να γίνουν", "Όταν πρέπει να ανακαλέσει πληροφορίες μετά από τουλάχιστον 1 ώρα (λέξεις, ορθογραφία, αριθμούς)", "Όταν πρέπει να ανακαλέσει απλές οδηγίες μετά από τουλάχιστον 1 ώρα", "Όταν πρέπει να ανακαλέσει σύνθετες-πολύπλοκες οδηγίες μετά από τουλάχιστον 1 ώρα", "Όταν μεσολαβεί μία ημέρα ή και περισσότερες"] },
        { name: "ΧΡΟΝΟΣ ΠΡΟΣΟΧΗΣ", desc: "Ανάλογα με τον χρόνο που απαιτείται από το παιδί να παρακολουθήσει, αυτό το παιδί έχει δυσκολία να ακούσει με προσοχή, όταν συγκριθεί με άλλα παιδιά της ίδιας ηλικίας", questions: ["Όταν πρέπει να ακούσει με προσοχή για λιγότερο από 5 λεπτά", "Όταν ο χρόνος που πρέπει να ακούσει είναι 5-10 λεπτά", "Όταν πρέπει να ακούσει για πάνω από 10 λεπτά", "Όταν ακούει σε ένα ήσυχο δωμάτιο", "Όταν ακούσει σε ένα δωμάτιο με θόρυβο", "Όταν ακούει μόλις ξυπνήσει το πρωί", "Όταν ακούσει λίγο πριν πάει να κοιμηθεί το βράδυ", "Όταν ακούσει σε ένα δωμάτιο και υπάρχουν άλλα παιδιά ή το αγαπημένο του παιχνίδι"] }
    ];

    let flatQuestions = [];
    sections.forEach(s => s.questions.forEach(q => flatQuestions.push({ text: q, cat: s.name, desc: s.desc })));
    let currentIdx = 0, answers = new Array(flatQuestions.length).fill(null), patientData = {};

    function formatDate(i) {
        let v = i.value.replace(/\D/g, '').slice(0, 8);
        if (v.length >= 2) v = v.slice(0, 2) + '/' + v.slice(2);
        if (v.length >= 5) v = v.slice(0, 5) + '/' + v.slice(5);
        i.value = v;
    }

    function calculateAge(dob) {
        if(!dob || dob.length < 10) return 0;
        const p = dob.split('/');
        const birth = new Date(p[2], p[1]-1, p[0]);
        const now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        if (now.getMonth() < birth.getMonth() || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
        return age;
    }

    function startTest() {
        const name = document.getElementById('pName').value, dob = document.getElementById('pDOB').value;
        if(!name || dob.length < 10) return alert("Συμπληρώστε τα στοιχεία.");
        patientData = { name, dob, age: calculateAge(dob), email: document.getElementById('pEmail').value, responder: document.getElementById('pResponder').value, date: new Date().toLocaleDateString('el-GR'), id: Date.now() };
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('screen-test').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = flatQuestions[currentIdx];
        document.getElementById('cat-label').innerText = q.cat;
        document.getElementById('cat-desc').innerText = q.desc;
        document.getElementById('q-text').innerText = `${currentIdx + 1}. ${q.text}.`;
        document.getElementById('progress').style.width = ((currentIdx + 1) / flatQuestions.length * 100) + "%";
        const list = document.getElementById('options-list');
        list.innerHTML = "";
        [{v:1, l:"+1", d:"μικρότερη δυσκολία"}, {v:0, l:"0", d:"ίδιος βαθμός"}, {v:-1, l:"-1", d:"ελαφρώς μεγαλύτερη"}, {v:-2, l:"-2", d:"μεγαλύτερη δυσκολία"}, {v:-3, l:"-3", d:"αρκετά μεγαλύτερη"}, {v:-4, l:"-4", d:"σημαντικά μεγαλύτερη"}, {v:-5, l:"-5", d:"αδυναμία λειτουργίας"}].forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn' + (answers[currentIdx] === opt.v ? ' selected' : '');
            btn.innerHTML = `<span class="opt-value">${opt.l}</span><span class="opt-text">${opt.d}</span>`;
            btn.onclick = () => { answers[currentIdx] = opt.v; renderQuestion(); if(currentIdx < flatQuestions.length-1) setTimeout(goNext, 150); };
            list.appendChild(btn);
        });
        document.getElementById('prev-btn').style.visibility = currentIdx > 0 ? 'visible' : 'hidden';
        document.getElementById('next-btn').innerText = currentIdx === flatQuestions.length - 1 ? "ΟΛΟΚΛΗΡΩΣΗ" : "ΕΠΟΜΕΝΟ →";
    }

    function goNext() { if(answers[currentIdx] === null) return alert("Επιλέξτε απάντηση."); if(currentIdx < flatQuestions.length - 1) { currentIdx++; renderQuestion(); } else finalize(); }
    function goBack() { if(currentIdx > 0) { currentIdx--; renderQuestion(); } }

    function finalize() {
        patientData.total = answers.reduce((a, b) => a + b, 0); // Επαναφορά στο SUM
        patientData.answers = [...answers];
        let db = JSON.parse(localStorage.getItem('chapps_db') || "[]");
        db.push(patientData);
        localStorage.setItem('chapps_db', JSON.stringify(db));
        showResults();
    }

    function showResults() {
        document.getElementById('screen-test').classList.add('hidden');
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-results').classList.remove('hidden');
        document.getElementById('res-name-display').innerText = patientData.name;
        document.getElementById('res-info-display').innerText = `Ηλικία: ${patientData.age} | Από: ${patientData.responder}`;
        document.getElementById('total-score').innerText = patientData.total;
        const list = document.getElementById('breakdown-list'); list.innerHTML = "";
        sections.forEach(s => {
            const sSum = flatQuestions.map((q, i) => q.cat === s.name ? patientData.answers[i] : null).filter(v => v !== null).reduce((a, b) => a + b, 0);
            list.innerHTML += `<div class="result-row"><span>${s.name}</span><span class="category-score">${sSum}</span></div>`;
        });
    }

    function exportCSV() {
        let csv = `Όνομα;${patientData.name}\nΗμ. Γέννησης;${patientData.dob}\nΗλικία;${patientData.age}\nΣυμπληρώθηκε από;${patientData.responder}\nEmail;${patientData.email}\nΣκορ;${patientData.total}\n\nΕνότητα;Ερώτηση;Βαθμός\n`;
        flatQuestions.forEach((q, i) => csv += `"${q.cat}";"${q.text}";${patientData.answers[i]}\n`);
        downloadCSV(csv, `CHAPPS_${patientData.name}.csv`);
    }

    function exportMasterCSV() {
        let db = JSON.parse(localStorage.getItem('chapps_db') || "[]"), csv = "Όνομα;Ημ. Γέννησης;Ηλικία;Από;Σκορ;Ημερομηνία\n";
        db.forEach(r => csv += `"${r.name}";"${r.dob}";${r.age};"${r.responder}";${r.total};"${r.date}"\n`);
        downloadCSV(csv, "CHAPPS_MASTER_HISTORY.csv");
    }

    function downloadCSV(csv, name) {
        const blob = new Blob(["\uFEFF", csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = name; link.click();
    }

    function sendToDoctor() {
        let body = `ΑΞΙΟΛΟΓΗΣΗ CHAPPS - ${patientData.name}\nΗλικία: ${patientData.age}\nΣυμπληρώθηκε από: ${patientData.responder}\nΣυνολικό Σκορ: ${patientData.total}\n\n`;
        sections.forEach(s => {
            const sSum = flatQuestions.map((q, i) => q.cat === s.name ? patientData.answers[i] : null).filter(v => v !== null).reduce((a, b) => a + b, 0);
            body += `${s.name}: ${sSum}\n`;
        });
        window.location.href = `mailto:?subject=CHAPPS Report - ${patientData.name}&body=${encodeURIComponent(body)}`;
    }

    function unlockAdmin() { if(prompt("Κωδικός:") === "apd7") { document.getElementById('admin-panel').classList.remove('hidden'); renderHistory(); } }
    
    function renderHistory() {
        const list = document.getElementById('history-list');
        const search = document.getElementById('searchBar').value.toLowerCase();
        const db = JSON.parse(localStorage.getItem('chapps_db') || "[]");
        list.innerHTML = "";
        db.filter(r => r.name.toLowerCase().includes(search)).reverse().forEach(r => {
            const item = document.createElement('div'); 
            item.className = 'history-item';
            item.style.cursor = "pointer";
            item.innerHTML = `
                <div style="flex:1" onclick="loadPatient(${r.id})">
                    <strong>${r.name}</strong> <br>
                    <small>${r.date} | Σκορ: ${r.total}</small>
                </div>
                <button onclick="deleteRec(event, ${r.id})" style="background:var(--danger); border:none; color:white; border-radius:8px; padding:10px; cursor:pointer;">🗑️</button>
            `;
            list.appendChild(item);
        });
    }

    function loadPatient(id) {
        const db = JSON.parse(localStorage.getItem('chapps_db') || "[]");
        const selected = db.find(r => r.id === id);
        if (selected) { patientData = selected; showResults(); }
    }

    function deleteRec(event, id) {
        event.stopPropagation();
        if(confirm("Διαγραφή εγγραφής;")) {
            let db = JSON.parse(localStorage.getItem('chapps_db') || "[]").filter(r => r.id !== id);
            localStorage.setItem('chapps_db', JSON.stringify(db));
            renderHistory();
        }
    }

    window.onload = () => { 
        setTimeout(() => { 
            document.getElementById('splash-screen').style.opacity = '0'; 
            setTimeout(() => { 
                document.getElementById('splash-screen').style.display = 'none'; 
                document.getElementById('app-container').style.display = 'block'; 
            }, 800); 
        }, 1500); 
    };
</script>
</body>
</html>
